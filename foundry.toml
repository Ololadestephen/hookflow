[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
remappings = [
  "v4-core/=lib/v4-core/",
  "v4-periphery/=lib/v4-periphery/",
  "forge-std/=lib/v4-core/lib/forge-std/src/"
]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"
xlayer_testnet = "${XLAYER_TESTNET_RPC_URL}"
